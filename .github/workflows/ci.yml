name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native:
    uses: ./.github/workflows/native-build.yml

  build-and-test:
    needs: native
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: artifacts/native

      - name: Copy native library to output (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p src/Primp/runtimes/linux-x64/native
          cp artifacts/native/native-linux-x64/libprimp_ffi.so src/Primp/runtimes/linux-x64/native/

      - name: Copy native library to output (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p src/Primp/runtimes/osx-arm64/native
          mkdir -p src/Primp/runtimes/osx-x64/native
          cp artifacts/native/native-osx-arm64/libprimp_ffi.dylib src/Primp/runtimes/osx-arm64/native/
          cp artifacts/native/native-osx-x64/libprimp_ffi.dylib src/Primp/runtimes/osx-x64/native/

      - name: Copy native library to output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src/Primp/runtimes/win-x64/native
          Copy-Item artifacts/native/native-win-x64/primp_ffi.dll src/Primp/runtimes/win-x64/native/

      - name: Restore
        run: dotnet restore primp.net.sln

      - name: Build
        run: dotnet build primp.net.sln --no-restore -c Release

      - name: Unit Tests
        run: dotnet test tests/Primp.Tests.Unit/Primp.Tests.Unit.csproj --no-build -c Release --logger "trx;LogFileName=unit.trx"

      - name: Integration Tests
        run: dotnet test tests/Primp.Tests.Integration/Primp.Tests.Integration.csproj --no-build -c Release --logger "trx;LogFileName=integration.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: '**/*.trx'
