name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  native:
    uses: ./.github/workflows/native-build.yml
    with:
      ref: ${{ github.ref }}

  pack-and-publish:
    needs: native
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: artifacts/native

      - name: Stage native libraries
        run: |
          for rid in linux-x64 linux-arm64 osx-x64 osx-arm64 win-x64 win-arm64; do
            mkdir -p src/Primp/runtimes/$rid/native
          done
          cp artifacts/native/native-linux-x64/libprimp_ffi.so src/Primp/runtimes/linux-x64/native/
          cp artifacts/native/native-linux-arm64/libprimp_ffi.so src/Primp/runtimes/linux-arm64/native/
          cp artifacts/native/native-osx-x64/libprimp_ffi.dylib src/Primp/runtimes/osx-x64/native/
          cp artifacts/native/native-osx-arm64/libprimp_ffi.dylib src/Primp/runtimes/osx-arm64/native/
          cp artifacts/native/native-win-x64/primp_ffi.dll src/Primp/runtimes/win-x64/native/
          cp artifacts/native/native-win-arm64/primp_ffi.dll src/Primp/runtimes/win-arm64/native/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Pack Primp
        run: dotnet pack src/Primp/Primp.csproj -c Release -p:PackageVersion=${{ steps.version.outputs.version }} -o nupkgs

      - name: Pack Primp.Extensions
        run: dotnet pack src/Primp.Extensions/Primp.Extensions.csproj -c Release -p:PackageVersion=${{ steps.version.outputs.version }} -o nupkgs

      - name: Push to NuGet
        run: dotnet nuget push "nupkgs/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: nupkgs/*.nupkg
